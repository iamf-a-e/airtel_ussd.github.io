<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airtel Phone Simulator - Flask</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    padding: 20px;
  }

  .container {
    text-align: center;
  }

  h1 {
    color: white;
    margin-bottom: 20px;
    font-size: 2rem;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }

  /* PHONE SHELL */
  .phone {
    width: 375px;
    height: 812px;
    background: #000;
    border-radius: 54px;
    box-shadow:
      0 0 0 1px #333,
      0 0 0 3px #1a1a1a,
      0 0 0 5px #444,
      0 60px 120px rgba(0,0,0,0.8),
      inset 0 0 0 1px #222;
    position: relative;
    overflow: hidden;
    user-select: none;
    margin: 0 auto;
  }

  .phone::before {
    content: '';
    position: absolute;
    right: -5px;
    top: 140px;
    width: 4px;
    height: 70px;
    background: #333;
    border-radius: 0 3px 3px 0;
    box-shadow: 0 90px 0 #333;
  }

  .phone::after {
    content: '';
    position: absolute;
    left: -5px;
    top: 120px;
    width: 4px;
    height: 35px;
    background: #333;
    border-radius: 3px 0 0 3px;
    box-shadow: 0 50px 0 #333, 0 95px 0 #333;
  }

  .screen {
    width: 100%;
    height: 100%;
    border-radius: 54px;
    overflow: hidden;
    position: relative;
  }

  /* HOME SCREEN */
  .home-screen {
    width: 100%;
    height: 100%;
    background: linear-gradient(160deg, #0d47a1 0%, #1565c0 30%, #6a1b9a 70%, #4a148c 100%);
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: column;
  }

  .wallpaper-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(255,255,255,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  /* STATUS BAR */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px 0;
    color: white;
    font-size: 15px;
    font-weight: 600;
    position: relative;
    z-index: 10;
  }

  .notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    background: #000;
    border-radius: 0 0 20px 20px;
  }

  /* CLOCK */
  .home-clock {
    text-align: center;
    margin-top: 60px;
    color: white;
    position: relative;
    z-index: 5;
  }

  .home-clock .time {
    font-size: 78px;
    font-weight: 200;
    letter-spacing: -3px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .home-clock .date {
    font-size: 18px;
    font-weight: 400;
    opacity: 0.9;
    margin-top: -5px;
  }

  /* APP GRID */
  .app-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 30px 24px;
    margin-top: auto;
    position: relative;
    z-index: 5;
  }

  .app-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .app-icon:active { transform: scale(0.9); }

  .app-icon-img {
    width: 60px;
    height: 60px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    position: relative;
  }

  .app-label {
    color: white;
    font-size: 11px;
    font-weight: 500;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  /* Dock */
  .dock {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    margin: 0 16px 34px;
    padding: 12px 20px;
    display: flex;
    justify-content: space-around;
    position: relative;
    z-index: 5;
  }

  .badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: #ff3b30;
    color: white;
    font-size: 10px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    border: 1.5px solid white;
  }

  /* OVERLAY SCREENS */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #f2f2f7;
    border-radius: 54px;
    overflow: hidden;
    display: none;
    flex-direction: column;
    z-index: 20;
  }

  .overlay.active { display: flex; }

  .app-header {
    background: rgba(242,242,247,0.95);
    backdrop-filter: blur(10px);
    padding: 50px 20px 12px;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .app-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #000;
    margin: 0;
    text-shadow: none;
  }

  .back-btn {
    color: #007aff;
    font-size: 16px;
    cursor: pointer;
    font-weight: 500;
  }

  /* DIAL PAD */
  .dialpad-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .display-number {
    font-size: 42px;
    font-weight: 300;
    color: #000;
    letter-spacing: 2px;
    min-height: 60px;
    text-align: center;
    margin-bottom: 20px;
    word-break: break-all;
  }

  .dialpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 280px;
    margin-bottom: 20px;
  }

  .dial-key {
    background: white;
    border: none;
    border-radius: 50%;
    width: 72px;
    height: 72px;
    margin: auto;
    font-size: 24px;
    font-weight: 400;
    color: #000;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    line-height: 1;
    font-family: 'Nunito', sans-serif;
  }

  .dial-key:active { background: #d1d1d6; }

  .dial-key .sub {
    font-size: 9px;
    color: #666;
    margin-top: 2px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  .call-btn {
    background: #34c759;
    border: none;
    border-radius: 50%;
    width: 72px;
    height: 72px;
    font-size: 28px;
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(52,199,89,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
  }

  .call-btn:active { transform: scale(0.95); }

  .delete-btn {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: #8e8e93;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 72px;
    height: 72px;
  }

  /* USSD DIALOG */
  .ussd-dialog {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    border-radius: 54px;
    display: none;
  }

  .ussd-dialog.active { display: flex; }

  .ussd-box {
    background: #1c1c1e;
    border-radius: 14px;
    width: 300px;
    max-width: 90%;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .ussd-title {
    color: white;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    padding: 16px 20px 8px;
    opacity: 0.6;
    letter-spacing: 0.5px;
  }

  .ussd-content {
    color: white;
    font-size: 14px;
    line-height: 1.7;
    padding: 0 20px 16px;
    text-align: center;
    white-space: pre-line;
  }

  .ussd-input-area {
    padding: 4px 20px 16px;
  }

  .ussd-input {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: white;
    font-size: 15px;
    padding: 8px 12px;
    font-family: 'Nunito', sans-serif;
    outline: none;
    text-align: center;
  }

  .ussd-input::placeholder {
    color: rgba(255,255,255,0.5);
  }

  .ussd-actions {
    display: flex;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .ussd-btn {
    flex: 1;
    padding: 14px;
    border: none;
    background: none;
    color: #0a84ff;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: background 0.15s;
  }

  .ussd-btn:hover { background: rgba(255,255,255,0.05); }

  .ussd-btn:first-child {
    border-right: 1px solid rgba(255,255,255,0.1);
    color: white;
    font-weight: 400;
    opacity: 0.7;
  }

  /* MESSAGES APP */
  .messages-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .message-thread {
    background: white;
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid #e5e5ea;
    cursor: pointer;
    gap: 12px;
    transition: background 0.1s;
  }

  .message-thread:active { background: #f2f2f7; }

  .thread-avatar {
    width: 50px;
    height: 50px;
    border-radius: 25px;
    background: linear-gradient(135deg, #ff3b30, #ff9500);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 20px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .thread-info { flex: 1; min-width: 0; }

  .thread-name {
    font-size: 15px;
    font-weight: 600;
    color: #000;
  }

  .thread-preview {
    font-size: 13px;
    color: #8e8e93;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .thread-time {
    font-size: 12px;
    color: #8e8e93;
  }

  /* Message view */
  .msg-view {
    display: none;
    flex-direction: column;
    height: 100%;
    position: absolute;
    inset: 0;
    background: #f2f2f7;
    z-index: 25;
  }

  .msg-view.active { display: flex; }

  .msg-view-header {
    background: rgba(242,242,247,0.95);
    padding: 50px 16px 12px;
    text-align: center;
    border-bottom: 1px solid rgba(0,0,0,0.1);
  }

  .msg-sender-name {
    font-size: 16px;
    font-weight: 700;
  }

  .msg-bubbles {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .msg-bubble {
    max-width: 78%;
    background: #e5e5ea;
    border-radius: 18px 18px 18px 4px;
    padding: 10px 14px;
    font-size: 14px;
    color: #000;
    line-height: 1.5;
    white-space: pre-wrap;
    align-self: flex-start;
  }

  .msg-time {
    font-size: 11px;
    color: #8e8e93;
    text-align: center;
    margin: 4px 0;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #8e8e93;
    gap: 12px;
    font-size: 15px;
  }

  .empty-state span { font-size: 48px; }

  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    z-index: 100;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .overlay.active { animation: slideUp 0.3s ease; }

  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .ussd-dialog.active .ussd-box { animation: popIn 0.2s ease; }

  .loading {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div class="container">
  <h1>📱 Airtel Zambia Simulator</h1>
  <div class="phone">
    <div class="screen">
      
      <!-- HOME SCREEN -->
      <div class="home-screen" id="homeScreen">
        <div class="wallpaper-overlay"></div>
        <div class="notch"></div>
        
        <div class="status-bar">
          <span id="statusTime">--:--</span>
          <div class="status-icons">
            <span>📶</span>
            <span>🔋</span>
          </div>
        </div>
        
        <div class="home-clock">
          <div class="time" id="homeClock">--:--</div>
          <div class="date" id="homeDate">Loading...</div>
        </div>
        
        <div class="app-grid" id="appGrid"></div>
        
        <div class="dock" id="dock"></div>
      </div>
      
      <!-- PHONE APP -->
      <div class="overlay" id="phoneApp">
        <div class="app-header">
          <span class="back-btn" onclick="closeApp('phoneApp')">✕</span>
          <h1>Phone</h1>
        </div>
        <div class="dialpad-container">
          <div class="display-number" id="dialDisplay"></div>
          <div class="dialpad" id="dialpad"></div>
          <div style="display:flex; gap:20px; align-items:center; width:100%; max-width:280px; justify-content:center;">
            <div style="width:72px;"></div>
            <button class="call-btn" onclick="dialCall()">📞</button>
            <button class="delete-btn" onclick="dialDelete()">⌫</button>
          </div>
        </div>
      </div>
      
      <!-- MESSAGES APP -->
      <div class="overlay" id="messagesApp">
        <div style="display:flex; flex-direction:column; height:100%;">
          <div class="app-header">
            <span class="back-btn" onclick="closeApp('messagesApp')">✕</span>
            <h1>Messages</h1>
          </div>
          <div class="messages-list" id="messagesList">
            <div class="empty-state" id="emptyMsgState">
              <span>💬</span>
              <div>No messages yet</div>
              <div style="font-size:13px; text-align:center; padding:0 40px;">Dial *117# to get started with Airtel services</div>
            </div>
          </div>
        </div>
        
        <!-- Message view -->
        <div class="msg-view" id="msgView">
          <div style="background:rgba(242,242,247,0.95); padding:50px 16px 12px; border-bottom:1px solid rgba(0,0,0,0.1); display:flex; align-items:center; gap:12px;">
            <span class="back-btn" onclick="closeMsgView()">‹ Back</span>
            <div style="flex:1; text-align:center;">
              <div style="font-size:16px; font-weight:700;" id="msgViewSender">Airtel</div>
            </div>
            <div style="width:50px;"></div>
          </div>
          <div class="msg-bubbles" id="msgBubbles"></div>
        </div>
      </div>
      
      <!-- USSD DIALOG -->
      <div class="ussd-dialog" id="ussdDialog">
        <div class="ussd-box">
          <div class="ussd-title">AIRTEL • *117#</div>
          <div class="ussd-content" id="ussdContent"></div>
          <div class="ussd-input-area" id="ussdInputArea" style="display:none">
            <input class="ussd-input" id="ussdInput" type="text" placeholder="Enter reply..." />
          </div>
          <div class="ussd-actions" id="ussdActions"></div>
        </div>
      </div>
      
      <div class="home-indicator"></div>
    </div>
  </div>
  <p style="color: white; margin-top: 10px; opacity: 0.8;">Click Phone or Messages app to begin</p>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let dialInput = '';
let messages = [];
let unreadCount = 0;
let currentMenu = null;
let currentMessages = [];

// ============================================================
// INITIALIZATION
// ============================================================
function initAppGrid() {
  const apps = [
    {name: 'Phone', icon: '📞', color: 'linear-gradient(135deg, #34c759, #20a044)', action: openPhoneApp},
    {name: 'Messages', icon: '💬', color: 'linear-gradient(135deg, #34c759, #20a044)', action: openMessages, badge: true},
    {name: 'Camera', icon: '📷', color: 'linear-gradient(135deg, #007aff, #0055b3)', action: null},
    {name: 'Maps', icon: '🗺️', color: 'linear-gradient(135deg, #ff9500, #cc7700)', action: null},
    {name: 'Music', icon: '📻', color: 'linear-gradient(135deg, #5856d6, #3634a3)', action: null},
    {name: 'Health', icon: '❤️', color: 'linear-gradient(135deg, #ff2d55, #cc0030)', action: null},
    {name: 'Calendar', icon: '📅', color: 'linear-gradient(135deg, #00c7be, #009990)', action: null},
    {name: 'Settings', icon: '⚙️', color: 'linear-gradient(135deg, #ff9500, #ffcc00)', action: null},
    {name: 'Safari', icon: '🌐', color: 'linear-gradient(135deg, #007aff, #5856d6)', action: null},
    {name: 'Videos', icon: '📺', color: 'linear-gradient(135deg, #ff3b30, #c70025)', action: null},
    {name: 'Notes', icon: '📝', color: 'linear-gradient(135deg, #34c759, #248a3d)', action: null},
    {name: 'Files', icon: '🔦', color: 'linear-gradient(135deg, #8e8e93, #636366)', action: null}
  ];
  
  const grid = document.getElementById('appGrid');
  grid.innerHTML = apps.map(app => `
    <div class="app-icon" onclick="${app.action ? app.action.name + '()' : ''}">
      <div class="app-icon-img" style="background: ${app.color}; position: relative;">
        ${app.icon}
        ${app.badge ? '<div class="badge" id="msgBadge" style="display:none">0</div>' : ''}
      </div>
      <div class="app-label">${app.name}</div>
    </div>
  `).join('');
  
  const dock = document.getElementById('dock');
  const dockApps = apps.slice(0, 4);
  dock.innerHTML = dockApps.map(app => `
    <div class="app-icon" onclick="${app.action ? app.action.name + '()' : ''}">
      <div class="app-icon-img" style="background: ${app.color}; width:54px; height:54px; position: relative;">
        ${app.icon}
        ${app.badge ? '<div class="badge" id="msgBadge2" style="display:none">0</div>' : ''}
      </div>
    </div>
  `).join('');
}

function initDialpad() {
  const keys = [
    '1', '2', '3', '4', '5', '6', '7', '8', '9', '*', '0', '#'
  ];
  const subs = {
    '2': 'ABC', '3': 'DEF', '4': 'GHI', '5': 'JKL',
    '6': 'MNO', '7': 'PQRS', '8': 'TUV', '9': 'WXYZ',
    '0': '+'
  };
  
  const dialpad = document.getElementById('dialpad');
  dialpad.innerHTML = keys.map(k => `
    <button class="dial-key" onclick="dialPress('${k}')">
      ${k}
      ${subs[k] ? `<span class="sub">${subs[k]}</span>` : '<span class="sub"></span>'}
    </button>
  `).join('');
}

// ============================================================
// CLOCK
// ============================================================
async function updateClock() {
  try {
    const response = await fetch('/api/time');
    const data = await response.json();
    document.getElementById('homeClock').textContent = data.time;
    document.getElementById('statusTime').textContent = data.time;
    document.getElementById('homeDate').textContent = data.date;
  } catch (error) {
    console.error('Failed to fetch time:', error);
  }
}

// ============================================================
// MESSAGES
// ============================================================
async function loadMessages() {
  try {
    const response = await fetch('/api/messages');
    currentMessages = await response.json();
    const unreadRes = await fetch('/api/unread');
    const unreadData = await unreadRes.json();
    unreadCount = unreadData.unread;
    updateBadge();
  } catch (error) {
    console.error('Failed to load messages:', error);
  }
}

async function addMessage(sender, text) {
  try {
    await fetch('/api/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sender, text})
    });
    await loadMessages();
  } catch (error) {
    console.error('Failed to add message:', error);
  }
}

async function markMessagesRead() {
  try {
    await fetch('/api/messages/read', {method: 'POST'});
    unreadCount = 0;
    updateBadge();
  } catch (error) {
    console.error('Failed to mark messages read:', error);
  }
}

function updateBadge() {
  const b1 = document.getElementById('msgBadge');
  const b2 = document.getElementById('msgBadge2');
  if (b1 && b2) {
    if (unreadCount > 0) {
      b1.style.display = 'flex';
      b2.style.display = 'flex';
      b1.textContent = unreadCount;
      b2.textContent = unreadCount;
    } else {
      b1.style.display = 'none';
      b2.style.display = 'none';
    }
  }
}

function renderMessagesList() {
  const list = document.getElementById('messagesList');
  const empty = document.getElementById('emptyMsgState');
  
  if (currentMessages.length === 0) {
    empty.style.display = 'flex';
    list.innerHTML = '';
    return;
  }
  
  empty.style.display = 'none';
  list.innerHTML = currentMessages.map((msg, idx) => `
    <div class="message-thread" onclick="openMsgView(${idx})">
      <div class="thread-avatar">${msg.sender[0]}</div>
      <div class="thread-info">
        <div class="thread-name">${msg.sender}</div>
        <div class="thread-preview">${msg.preview}</div>
      </div>
      <div class="thread-time">${msg.time}</div>
    </div>
  `).join('');
}

function openMsgView(idx) {
  const msg = currentMessages[idx];
  document.getElementById('msgViewSender').textContent = msg.sender;
  const bubbles = document.getElementById('msgBubbles');
  bubbles.innerHTML = msg.bubbles.map(b => `
    <div class="msg-time">${b.time}</div>
    <div class="msg-bubble">${b.text}</div>
  `).join('');
  document.getElementById('msgView').classList.add('active');
  setTimeout(() => bubbles.scrollTop = bubbles.scrollHeight, 50);
}

function closeMsgView() {
  document.getElementById('msgView').classList.remove('active');
}

// ============================================================
// USSD
// ============================================================
async function openUSSD(menuKey) {
  try {
    const response = await fetch(`/api/ussd/menu/${menuKey}`);
    const menu = await response.json();
    
    if (menu.error) {
      console.error('Menu error:', menu.error);
      return;
    }
    
    currentMenu = menuKey;
    const dialog = document.getElementById('ussdDialog');
    const content = document.getElementById('ussdContent');
    const inputArea = document.getElementById('ussdInputArea');
    const actions = document.getElementById('ussdActions');
    const input = document.getElementById('ussdInput');
    
    content.textContent = menu.text;
    dialog.classList.add('active');
    
    if (menu.hasInput) {
      inputArea.style.display = 'block';
      input.value = '';
      input.placeholder = menu.inputPlaceholder || 'Enter reply...';
      setTimeout(() => input.focus(), 100);
      
      actions.innerHTML = `
        <button class="ussd-btn" onclick="closeUSSD()">Dismiss</button>
        <button class="ussd-btn" style="color: #0a84ff; font-weight: 600;" onclick="ussdReply()">Reply</button>
      `;
      
      input.onkeydown = (e) => { if (e.key === 'Enter') ussdReply(); };
    } else {
      inputArea.style.display = 'none';
      actions.innerHTML = `<button class="ussd-btn" style="flex:1; border:none;" onclick="closeUSSD()">Dismiss</button>`;
    }
  } catch (error) {
    console.error('Failed to open USSD:', error);
  }
}

function showUSSDMsg(text, autoClose = false) {
  const dialog = document.getElementById('ussdDialog');
  const content = document.getElementById('ussdContent');
  const inputArea = document.getElementById('ussdInputArea');
  const actions = document.getElementById('ussdActions');
  
  content.textContent = text;
  inputArea.style.display = 'none';
  dialog.classList.add('active');
  
  actions.innerHTML = `<button class="ussd-btn" style="flex:1; border:none;" onclick="closeUSSD()">OK</button>`;
  
  if (autoClose) {
    setTimeout(closeUSSD, 3000);
  }
}

function closeUSSD() {
  document.getElementById('ussdDialog').classList.remove('active');
  currentMenu = null;
}

async function ussdReply() {
  const input = document.getElementById('ussdInput').value.trim();
  if (!input) return;
  
  try {
    const response = await fetch('/api/ussd/submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({menu: currentMenu, input})
    });
    
    const data = await response.json();
    
    if (data.error) {
      document.getElementById('ussdInput').value = '';
      document.getElementById('ussdInput').placeholder = data.error;
      return;
    }
    
    closeUSSD();
    
    if (data.action === 'menu') {
      openUSSD(data.menu);
    } else if (data.action === 'message') {
      await addMessage('Airtel', data.message);
    }
  } catch (error) {
    console.error('Failed to submit USSD:', error);
  }
}

// ============================================================
// NAVIGATION
// ============================================================
function openPhoneApp() {
  document.getElementById('phoneApp').classList.add('active');
  dialInput = '';
  updateDialDisplay();
}

async function openMessages() {
  document.getElementById('messagesApp').classList.add('active');
  await loadMessages();
  await markMessagesRead();
  renderMessagesList();
}

function closeApp(id) {
  document.getElementById(id).classList.remove('active');
}

// ============================================================
// DIAL PAD
// ============================================================
function dialPress(key) {
  dialInput += key;
  updateDialDisplay();
}

function dialDelete() {
  dialInput = dialInput.slice(0, -1);
  updateDialDisplay();
}

function updateDialDisplay() {
  document.getElementById('dialDisplay').textContent = dialInput || '';
}

function dialCall() {
  if (dialInput === '*117#') {
    closeApp('phoneApp');
    openUSSD('main');
    dialInput = '';
    updateDialDisplay();
  } else if (dialInput.startsWith('*') && dialInput.endsWith('#')) {
    showUSSDMsg(`Service unavailable.\nPlease dial *117# for Airtel services.`, true);
  } else if (dialInput.length > 0) {
    showUSSDMsg(`Calling ${dialInput}...\n\n📞 (Simulated call)`, true);
  }
}

// ============================================================
// INITIALIZE
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  initAppGrid();
  initDialpad();
  updateClock();
  setInterval(updateClock, 10000);
  loadMessages();
});
</script>
